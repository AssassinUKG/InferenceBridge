# InferenceBridge — example configuration
# Copy to: %APPDATA%\InferenceBridge\inference-bridge.toml (Windows)
#       or: ~/.config/InferenceBridge/inference-bridge.toml (Linux/Mac)

[server]
port = 8800
host = "127.0.0.1"
# Safe startup/load default. API clients can request a larger context explicitly.
default_ctx_size = 16384
# Enables one bounded local repair pass if a model emits malformed tool-call arguments.
tool_argument_repair_enabled = true

[models]
# Point at your LM Studio models cache and any additional model directories
scan_dirs = [
    "C:\\Users\\USER\\.cache\\lm-studio\\models",
]

[process]
# Leave empty to auto-detect llama-server from PATH
llama_server_path = ""
# -1 = offload all layers to GPU
gpu_layers = -1
# 0 = auto-detect thread count
threads = 0
# Optional speculative decoding. For Gemma/Qwen MTP draft models:
# draft_model_path = "C:\\path\\to\\draft-model.gguf"
# spec_type = "draft-mtp"
# spec_draft_n_max = 3

[ui]
theme = "dark"
