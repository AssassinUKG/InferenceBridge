# InferenceBridge example configuration
#
# Copy to the app support config path if you want to seed settings by hand.
# Windows: %LOCALAPPDATA%\InferenceBridge\inference-bridge.toml
# macOS:   ~/Library/Application Support/InferenceBridge/inference-bridge.toml
# Linux:   ~/.local/share/InferenceBridge/inference-bridge.toml
#
# Do not put real tokens or secrets in this example file.

[server]
port = 8800
host = "127.0.0.1"
autostart = true
default_ctx_size = 32768
tool_argument_repair_enabled = true
# Empty or omitted means no Bearer auth is required.
api_key = ""
# Optional server defaults can be added when needed:
# default_temperature = 0.2
# default_top_p = 0.95
# default_top_k = 40
# default_max_tokens = 2048

[models]
# Add absolute model directories here. Leave empty to let the app auto-detect
# common LM Studio / Hugging Face cache locations.
scan_dirs = []

[process]
llama_server_path = ""
llama_diffusion_cli_path = ""
gpu_layers = -1
threads = 0
threads_batch = 0
kill_on_exit = true
backend_preference = "auto" # auto, cuda, cpu
batch_size = 0
ubatch_size = 0
flash_attn = true
use_mmap = true
use_mlock = false
cont_batching = true
parallel_slots = 1
main_gpu = 0
# Legacy compatibility setting; no --defrag-thold flag is emitted.
defrag_thold = 0.0
rope_freq_scale = 0.0
fit_mode = ""
# cache_ram_mb = 8192
# ctxcp = 4
use_jinja = true
reasoning_mode = "" # Tess/Qwen3.6 profiles resolve this explicitly to on or off
template_mode = "repo"
# template_name = "chatml"
# custom_template_path = "C:\\path\\to\\template.jinja"
# Model-specific template kwargs only; use reasoning_mode for thinking on/off.
# chat_template_kwargs_json = "{}"
cache_type_k = "q8_0"
cache_type_v = "q8_0"
kv_unified = true
no_warmup = false
ctx_shift = false
tensor_split = []
draft_model_path = ""
spec_type = ""
spec_draft_n_max = 0
draft_max_tokens = 0
draft_min_tokens = 0
draft_p_min = 0.0
extra_args = []
diffusion_n_predict = 2048
diffusion_kv_cache = "auto" # auto, on, off
diffusion_visual = false
diffusion_extra_args = []
model_load_timeout_secs = 300
first_token_timeout_secs = 300
inter_token_timeout_secs = 120
health_poll_interval_ms = 150

[image_generation]
# Experimental native image runtime. It stays unavailable until enabled and
# every file in the selected bundle validates.
enabled = false
runner_path = ""
# Empty uses the app support `images` directory.
output_dir = ""
default_bundle = "qwen-image-2512-q6"
default_profile = "quality" # preview, quality, max_quality
warn_temperature_c = 85.0
cooldown_temperature_c = 70.0

# Add a bundle only after installing and verifying all three components:
# [[image_generation.bundles]]
# id = "qwen-image-2512-q6"
# name = "Qwen-Image-2512 Q6"
# architecture = "qwen_image"
# quantization = "Q6_K"
# transformer_path = "C:\\path\\to\\qwen-image-2512-q6_k.gguf"
# text_encoder_path = "C:\\path\\to\\qwen2.5-vl-7b-q8_0.gguf"
# vae_path = "C:\\path\\to\\qwen_image_vae.safetensors"

[providers]
active = "managed_llamacpp" # managed_llamacpp, lm_studio, sglang, openai

[providers.lm_studio]
enabled = false
base_url = "http://127.0.0.1:1234/v1"
api_key = ""

[providers.sglang]
enabled = false
base_url = "http://127.0.0.1:30000/v1"
api_key = ""

[providers.openai]
enabled = false
base_url = "https://api.openai.com/v1"
# Optional. If blank, InferenceBridge also checks OPENAI_API_KEY.
api_key = ""

# response_format and /v1/messages need no extra config.
# /v1/embeddings currently proxies to the loaded llama-server model. Future
# Phase B work can add a dedicated embedding runtime here.
# [embeddings]
# model_path = "C:\\path\\to\\nomic-embed-text.gguf"
# enabled = false

[hub]
# Hugging Face token for gated metadata/downloads. Leave blank in examples.
hf_api_key = ""

[ui]
theme = "dark"
